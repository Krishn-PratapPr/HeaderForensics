version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-admin123}
      - PORT=5000
    volumes:
      # Persistent storage for SQLite database registry.db
      - registry_db:/app/instance
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Since the browser makes the API calls, it must be the public/host URL of the backend.
        # Defaults to localhost:5000 for standard local development.
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  registry_db:
